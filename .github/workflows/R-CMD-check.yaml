# R CMD check on every push to main and every PR.
# Single Ubuntu job, latest R release. The plan is to keep this minimal
# while the package is private and unreleased. Add macOS / Windows /
# multiple R versions later if the deployment story changes.
#
# nichenetr is in Suggests but is heavy to install in CI (catboost,
# glmnet, many system deps) and not required for the core test suite
# (LR tests use skip_if_not_installed). We do NOT install it here, and
# _R_CHECK_FORCE_SUGGESTS_=false tells R CMD check to tolerate the
# missing suggested package.

name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown
            bioc::SpatialExperiment
            bioc::SummarizedExperiment
            bioc::SingleCellExperiment
            bioc::S4Vectors
            bioc::fgsea
            bioc::msigdbr
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--as-cran")'
